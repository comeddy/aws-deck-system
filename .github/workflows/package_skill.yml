name: Package & Release Skill

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate SKILL.md frontmatter
        run: |
          python << 'EOF'
          import re, sys, yaml
          with open('skill/SKILL.md') as f:
              content = f.read()
          m = re.match(r'^---\n(.*?)\n---', content, re.DOTALL)
          if not m:
              sys.exit('SKILL.md missing YAML frontmatter')
          fm = yaml.safe_load(m.group(1))
          for required in ['name', 'description']:
              if required not in fm:
                  sys.exit(f'SKILL.md missing required field: {required}')
          assert len(fm['description']) >= 100, "Description too short (<100 chars)"
          assert len(fm['description']) <= 1500, "Description too long (>1500 chars)"
          print(f"✓ Skill: {fm['name']} v{fm.get('version', '?')}")
          print(f"  description length: {len(fm['description'])} chars")
          EOF

      - name: Validate reference files exist
        run: |
          for f in skill/references/design_tokens.md \
                   skill/references/layout_patterns.md \
                   skill/references/speaker_script_guide.md \
                   skill/references/qa_checklist.md \
                   skill/scripts/prepare_assets.py \
                   skill/scripts/build_deck.js; do
            if [ ! -f "$f" ]; then
              echo "Missing: $f"
              exit 1
            fi
            echo "✓ $f"
          done

      - name: Package as .skill (zip)
        run: |
          chmod +x scripts/package_skill.sh
          ./scripts/package_skill.sh "${{ github.event.release.tag_name || github.event.inputs.version }}"
          ls -la *.skill

      - name: Upload to release (on release event)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: aws-presentation-*.skill

      - name: Upload as artifact (on manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: aws-presentation-skill-${{ inputs.version }}
          path: aws-presentation-*.skill

  notify-slack:
    needs: package
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Notify #aws-deck-automation
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "$(cat <<EOF
          {
            "blocks": [
              {
                "type": "header",
                "text": { "type": "plain_text", "text": "📦 AWS Presentation Skill ${{ github.event.release.tag_name }}" }
              },
              {
                "type": "section",
                "text": { "type": "mrkdwn", "text": "*Release notes:*\n${{ github.event.release.body }}" }
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": { "type": "plain_text", "text": "View Release" },
                    "url": "${{ github.event.release.html_url }}"
                  }
                ]
              }
            ]
          }
          EOF
          )" \
          "${{ secrets.SLACK_WEBHOOK_DECK_AUTOMATION }}"
